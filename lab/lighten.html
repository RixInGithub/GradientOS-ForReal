<!DOCTYPE html>
<html>
	<head><title>lighten color</title></head>
	<body>
		<h1>lighten color</h1>
		<p>input color: <input type="text" id="inp" value="#48f"></p>
		<p>fraction: <input type="number" id="a" value="2">/<input type="number" id="b" value="3"></p>
		<button id="btn">go</button>
		<p>output: <span id="o">press go idfk</span></p>
		<script>
			btn.addEventListener("click", function() {
				var subj = document.createElement("div")
				subj.style.color = inp.value
				subj.style.width = 0
				subj.style.height = 0
				subj.style.display = "inline-block"
				document.body.appendChild(subj)
				var rgb = getComputedStyle(subj).color.slice(4,-1).split(", ").map(Number)
				o.textContent = "#"+rgb.map(function(c){return(c)+((255-c)*a.value)/b.value}).reduce(function(a,c){return(a)+Math.round(c).toString(16).padStart(2,0)},"")
			})
		</script>
	</body>
</html>
